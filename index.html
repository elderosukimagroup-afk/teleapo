function LD(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function SV(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function pad(n){return n<10?"0"+n:""+n}
function timeNow(){var d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds())}
function dateNow(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function dateJP(){var d=new Date();return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日"}
function dialPhone(n){if(!n)return;var c=n.replace(/[^\d+\-]/g,"");if(!c)return;var a=document.createElement("a");a.href="tel:"+c;a.style.display="none";document.body.appendChild(a);a.click();setTimeout(function(){try{document.body.removeChild(a)}catch(e){}},300)}

/* ===== GAS API ===== */
function gasGet(url,pin,callback){
  if(!url){callback(null);return}
  fetch(url+"?pin="+encodeURIComponent(pin)+"&t="+Date.now(),{redirect:"follow"})
    .then(function(r){return r.text()})
    .then(function(t){try{callback(JSON.parse(t))}catch(e){callback(null)}})
    .catch(function(){callback(null)})
}
function gasPost(url,data){
  if(!url)return;
  try{fetch(url,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(data),mode:"no-cors"})}catch(e){}
}

/* ===== STATE ===== */
var S={
  screen:"login",role:null,pin:"",pinErr:"",toast:"",toastTmr:null,loading:false,
  prospects:[],colMap:null,ci:0,skipped:{},
  callHist:[],appoHist:[],att:{},
  ck:{},cardI:0,tsec:0,tOn:false,tRef:null,
  selRes:null,memo:"",

S.gasUrl=LD("app-gas")||"";

function loadUser(uid){
  S.prospects=LD("app-list-"+uid)||[];S.colMap=LD("app-cm-"+uid)||null;S.ci=0;S.skipped=LD("app-skip-"+uid)||{};
  S.callHist=LD("app-calls-"+uid)||[];S.appoHist=LD("app-appos-"+uid)||[];S.att=LD("app-att-"+uid)||{};
}
function gf(row,f){if(!row||!S.colMap||S.colMap[f]<0)return"";return String(row[S.colMap[f]]||"").trim()}
function today(){return dateNow()}
function todayCalls(){var uid=S.role&&S.role!=="admin"?S.role.id:"";return S.callHist.filter(function(c){return c.d===today()&&c.uid===uid})}
function isCalled(i){return todayCalls().some(function(c){return c.pi===i})}
function isSkipped(i){return S.skipped[i]===true}
function shouldShow(i){return!isCalled(i)&&!isSkipped(i)}
function comp(){return REQS.length>0?Math.round(REQS.filter(function(x){return S.ck[x.id]}).length/REQS.length*100):0}
function todayAtt(){return S.att[today()]||{}}
function timerFmt(){return pad(Math.floor(S.tsec/60))+":"+pad(S.tsec%60)}
function flash(m){S.toast=m;R();clearTimeout(S.toastTmr);S.toastTmr=setTimeout(function(){S.toast="";R()},2500)}
function goNext(){for(var i=S.ci+1;i<S.prospects.length;i++)if(shouldShow(i)){S.ci=i;return};for(var i=0;i<S.ci;i++)if(shouldShow(i)){S.ci=i;return}}

function getUpcoming(){
  var now=new Date();var result=[];
  S.appoHist.forEach(function(a){
    if(!a.datetime)return;try{var dt=new Date(a.datetime)}catch(e){return}
    if(isNaN(dt.getTime()))return;
    var diff=(dt.getTime()-now.getTime())/(1000*60*60*24);
    if(diff>=0&&diff<=3)result.push({company:a.company||"",person:a.person||"",phone:a.phone||"",address:a.address||"",datetime:a.datetime,daysLeft:Math.ceil(diff)});
  });return result;
}

/* ===== Fetch list from Google Sheets via GAS ===== */
function fetchListFromSheets(staffObj){
  if(!S.gasUrl){return}
  S.loading=true;R();
  gasGet(S.gasUrl,staffObj.pin,function(data){
    S.loading=false;
    if(data&&data.rows&&data.rows.length>0){
      S.prospects=data.rows;
      S.colMap=data.cm||{co:0,ph:1,pe:2,ad:3};
      S.ci=0;S.skipped={};
      SV("app-list-"+staffObj.id,data.rows);
      SV("app-cm-"+staffObj.id,data.cm||{co:0,ph:1,pe:2,ad:3});
      SV("app-skip-"+staffObj.id,{});
      flash("✅ スプレッドシートから"+data.rows.length+"件取得");
    }else if(data&&data.error){
      flash("⚠ "+data.error);
    }
    R();
  });
}

/* ===== CSV Parser (for manual paste fallback) ===== */
function parseCSV(raw){
  if(!raw||!raw.trim())return{err:"テキストが空です"};
  var text=raw.replace(/^\uFEFF/,"").replace(/\u200B/g,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  var lines=text.split("\n").filter(function(l){return l.trim()});
  if(!lines.length)return{err:"データが空です"};
  var sep="\t";if(lines[0].indexOf("\t")<0){sep=lines[0].indexOf(",")>=0?",":"SP"}
  function split(l){if(sep==="\t")return l.split("\t").map(function(c){return c.trim()});if(sep===","){var r=[],cur="",q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"')q=!q;else if(ch===","&&!q){r.push(cur.trim());cur=""}else cur+=ch}r.push(cur.trim());return r}return l.split(/\s{2,}/).map(function(c){return c.trim()})}
  var all=lines.map(split);
  var hdrKeys=["施設","会社","法人","事業所","名称","名前","電話","tel","phone","番号","担当","氏名","住所","company","name","連絡","管理者","施設長","クライアント","顧客"];
  var fl=all[0].join("").toLowerCase().replace(/[\s　]/g,"");var isH=false;for(var k=0;k<hdrKeys.length;k++){if(fl.indexOf(hdrKeys[k])>=0){isH=true;break}}
  var hasP=false;for(var j=0;j<all[0].length;j++){if(/^\d{2,4}[\-\d]{4,}/.test(all[0][j])){hasP=true;break}}if(hasP)isH=false;
  var data,cm;
  if(isH&&all.length>=2){data=all.slice(1);var hl=all[0].map(function(h){return(h||"").toLowerCase().replace(/[\s　]/g,"")});function fc(ps){for(var i=0;i<hl.length;i++)for(var j=0;j<ps.length;j++)if(hl[i].indexOf(ps[j])>=0)return i;return-1}cm={co:fc(["施設","会社","法人","事業所","名称","名前","company","name","クライアント","顧客"]),ph:fc(["電話","tel","phone","番号","連絡"]),pe:fc(["担当","氏名","施設長","管理者"]),ad:fc(["住所","所在地","address"])}}
  else{data=all;var nc=all[0].length;var phC=-1;for(var c=0;c<nc;c++){var h=0;for(var r=0;r<Math.min(data.length,5);r++){if(data[r][c]&&/[\d\-]{6,}/.test(data[r][c]))h++}if(h>=Math.min(data.length,2)){phC=c;break}}
  if(nc<=1)cm={co:0,ph:-1,pe:-1,ad:-1};else if(nc===2)cm={co:phC===0?1:0,ph:phC>=0?phC:1,pe:-1,ad:-1};else if(nc===3)cm={co:phC===0?1:0,ph:phC>=0?phC:1,pe:2,ad:-1};else cm={co:0,ph:phC>=0?phC:1,pe:2,ad:3}}
  data=data.filter(function(r){return r.some(function(c){return c&&c.trim()})});
  if(!data.length)return{err:"データ行0件"};return{err:null,rows:data,cm:cm,count:data.length}
}

/* ===== ACTIONS ===== */
function tryLogin(){
  var p=S.pin;
  if(p.length===3){var f=null;for(var i=0;i<STAFF.length;i++)if(STAFF[i].pin===p){f=STAFF[i];break}
    if(f){S.role=f;S.screen="home";S.pin="";S.pinErr="";loadUser(f.id);R();fetchListFromSheets(f);return}
  }
  if(p.length===4){
    if(p===ADMIN_PIN){S.role="admin";S.screen="admin";S.pin="";S.pinErr="";R()}
    else{S.pinErr="番号が違います";S.pin="";R()}
  }
}
function doImport(){
  var ta=document.getElementById("impTA");var val=ta?ta.value:"";
  if(!val.trim()){S.impErr="テキストが空です";R();return}
  var r=parseCSV(val);if(r.err){S.impErr=r.err;R();return}
  var uid=S.role==="admin"&&S.adminTarget?S.adminTarget:S.role&&S.role!=="admin"?S.role.id:null;
  if(!uid){S.impErr="ユーザー未選択";R();return}
  SV("app-list-"+uid,r.rows);SV("app-cm-"+uid,r.cm);
  if(S.role!=="admin"&&S.role.id===uid){S.prospects=r.rows;S.colMap=r.cm;S.ci=0;S.skipped={};SV("app-skip-"+uid,{})}
  S.showImp=false;S.impErr="";
  var sn="";for(var i=0;i<STAFF.length;i++)if(STAFF[i].id===uid)sn=STAFF[i].name;
  flash("✅ "+sn+"に"+r.count+"件読込")
}

function saveResult(){
  if(!S.selRes)return;var mEl=document.getElementById("memoTA");if(mEl)S.memo=mEl.value;
  var cur=S.prospects[S.ci]||null;
  var e={id:Date.now(),uid:S.role.id,co:cur?gf(cur,"co"):"—",pe:cur?gf(cur,"pe"):"—",ph:cur?gf(cur,"ph"):"",r:S.selRes,cp:comp(),dur:timerFmt(),n:S.memo,d:today(),tm:timeNow().slice(0,5),pi:S.ci};
  S.callHist.unshift(e);SV("app-calls-"+S.role.id,S.callHist);
  S.ck={};S.cardI=0;S.memo="";stopTimer();S.tsec=0;

  else{goNext();S.selRes=null;S.screen="home";flash("✅ 保存完了");R()}
}
function sendAppo(){
  ["project","company","person","phone","role","address","datetime","email","personality"].forEach(function(f){var el=document.getElementById("af_"+f);if(el)S.af[f]=el.value});
  var a=S.af;var body="アポイント報告\n\n案件名: "+a.project+"\n会社名: "+a.company+"\n担当者: "+a.person+"（"+a.gender+"）\n電話: "+a.phone+"\n役職: "+a.role+"\n住所: "+a.address+"\nアポ日時: "+a.datetime+"\nメール: "+a.email+"\n人柄: "+a.personality+"\n\n報告者: "+S.role.name;

}

  h+='</div></div>';
  root.innerHTML=h;
