<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',-apple-system,sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:14px;outline:none}
.card{background:#fff;border-radius:14px;padding:14px;border:1px solid #e2e8f0;margin-bottom:8px}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:800;min-height:52px;text-align:center;cursor:pointer}
.g{background:linear-gradient(135deg,#10b981,#059669)}.b{background:#3b82f6}.n{background:#1a237e}
.sm,.nb{flex:1;padding:8px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;color:#64748b;font-size:12px;font-weight:600;min-height:36px;text-align:center}
.nb{padding:11px;border-radius:10px;font-size:13px;min-height:44px}
.lb{display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:3px}
.inp{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;color:#1e293b;box-sizing:border-box}

.ta{width:100%;padding:12px;border:1.5px solid #e2e8f0;border-radius:10px;background:#f1f5f9;color:#1e293b;resize:vertical;box-sizing:border-box}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:700;z-index:999}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sh{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:50}
.bk{background:#f1f5f9;border:none;border-radius:8px;padding:6px 12px;color:#64748b;font-size:12px;font-weight:600}
.ab{padding:10px 4px;border:2px solid;border-radius:8px;background:#fff;font-size:12px;font-weight:700;min-height:42px;text-align:center}
.kpi{background:#fff;border-radius:12px;padding:12px;text-align:center;border:1px solid #e2e8f0}
.mb{padding:14px 12px;border:1px solid #e2e8f0;border-radius:14px;background:#fff;color:#1e293b;font-size:14px;font-weight:700;text-align:left;width:100%}
.err{margin-top:8px;padding:10px;background:#fef2f2;border-radius:8px;font-size:12px;color:#dc2626;line-height:1.6;white-space:pre-line}
.mono{font-family:'Courier New',monospace}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

<script>

var STEPS=[{id:1,t:"不信感払拭",c:"#3b82f6",ic:"🤝",cps:[{id:"1a",l:"第一声",s:"お忙しいところ恐れ入ります。\n○○の△△と申します。",r:1,tip:"明るくゆっくり"},{id:"1b",l:"用件提示",s:"人材確保について\n1分だけお時間よろしいでしょうか？",r:1,tip:"「1分だけ」"},{id:"1c",l:"第三者話法",s:"先日○○市の施設様にも\nお話しさせていただき\n大変喜ばれました。",r:1,tip:"近隣事例"},{id:"1d",l:"許可取り",s:"少しだけお話を\n聞いていただけますか？",r:0,tip:"Yesを取る"}]},{id:2,t:"関心喚起",c:"#10b981",ic:"💡",cps:[{id:"2a",l:"トレンド",s:"特定技能の外国人介護士が\n注目されているのは\nご存知ですか？",r:1,tip:"質問で巻き込む"},{id:"2b",l:"数字",s:"導入施設様の92%が\n『もっと早く採用すれば』\nとおっしゃっています。",r:1,tip:"数字は武器"},{id:"2c",l:"匂わせ",s:"完全成功報酬で\nリスクなく始められる\n方法があるんです。",r:1,tip:"好奇心刺激"},{id:"2d",l:"橋渡し",s:"ちなみに施設長様のところは\n人材確保いかがですか？",r:1,tip:"Step3へ"}]},{id:3,t:"問題・願望",c:"#f59e0b",ic:"👂",cps:[{id:"3a",l:"現状",s:"介護スタッフは\n何名体制ですか？",r:1,tip:"数字で把握"},{id:"3b",l:"課題",s:"人材確保で一番\nお困りのことは？",r:1,tip:"最重要"},{id:"3c",l:"影響",s:"運営面で\nどんな影響が？",r:1,tip:"痛み認識"},{id:"3d",l:"理想",s:"どんな状態なら\n安心ですか？",r:1,tip:"ゴール言語化"},{id:"3e",l:"確認",s:"○○が課題で\n△△が理想ですね？",r:1,tip:"オウム返し"}]},{id:4,t:"解決→アポ",c:"#ef4444",ic:"🎯",cps:[{id:"4a",l:"解決策",s:"その課題、川嶋メソッドで\n解決できます。",r:1,tip:"課題をそのまま"},{id:"4b",l:"事例",s:"同じ悩みの施設様が\n3ヶ月で人材確保に\n成功しました。",r:1,tip:"同規模事例"},{id:"4c",l:"リスク0",s:"完全成功報酬で\n費用は一切かかりません。",r:1,tip:"断る理由を潰す"},{id:"4d",l:"クロージング",s:"来週の前半と後半\nどちらがご都合\nよろしいですか？",r:1,tip:"二者択一"},{id:"4e",l:"確定",s:"では○月○日○時に\nお伺いします。\nありがとうございました。",r:1,tip:"復唱"}]}];
var ALL_CP=[];STEPS.forEach(function(s){s.cps.forEach(function(c){ALL_CP.push({id:c.id,l:c.l,s:c.s,r:c.r,tip:c.tip,sId:s.id,sC:s.c,sT:s.t,sIc:s.ic})})});

var RES_LIST=[{id:"appo",l:"アポ獲得",i:"🎯",c:"#10b981"},{id:"cb",l:"再架電",i:"📞",c:"#f59e0b"},{id:"info",l:"資料送付",i:"📨",c:"#3b82f6"},{id:"absent",l:"不在",i:"🚫",c:"#6b7280"},{id:"refused",l:"断り",i:"✋",c:"#ef4444"},{id:"wrong",l:"不通",i:"❌",c:"#9ca3af"},{id:"fu",l:"フォロー",i:"📋",c:"#8b5cf6"},{id:"other",l:"その他",i:"📝",c:"#64748b"}];
function LS(k,v){if(v===undefined){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
var V="login",user=null,pin="",pinErr="",rows=[],cm=null,ci=0,callHist=[],appoList=[],att={},gasUrl="",showPaste=false,pasteErr="",ck={},cardI=0,timerSec=0,timerOn=false,timerRef=null,res=null,callNotes="",af={project:"",company:"",person:"",gender:"男",phone:"",role:"",address:"",datetime:"",email:"",personality:""},toastMsg="",toastTmr=null;
(function(){var l=LS("k10-list");if(l){rows=l.d||[];cm=l.c||null}callHist=LS("k10-hist")||[];appoList=LS("k10-appo")||[];gasUrl=LS("k10-gas")||""})();
function dial(n){if(!n)return;var c=n.replace(/[^\d+\-]/g,"");if(!c)return;var a=document.createElement("a");a.href="tel:"+c;a.style.display="none";document.body.appendChild(a);a.click();setTimeout(function(){try{document.body.removeChild(a)}catch(e){}},200)}
function pad(n){return n<10?"0"+n:""+n}
function fmtTime(){var d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds())}
function fmtDate(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function fmtJP(){var d=new Date();return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日"}
function fmtTimer(){return pad(Math.floor(timerSec/60))+":"+pad(timerSec%60)}
function gf(r,f){if(!r||!cm||cm[f]<0)return"";return String(r[cm[f]]||"").trim()}
function today(){return fmtDate()}
function getTdc(){return callHist.filter(function(c){return c.d===today()&&c.uid===(user?user.id:"")})}
function isCalled(i){return getTdc().some(function(c){return c.pi===i})}
function getComp(){return REQ_CP.length>0?Math.round(REQ_CP.filter(function(c){return ck[c.id]}).length/REQ_CP.length*100):0}
function getCurA(){return att[today()]||{}}
function flash(m){toastMsg=m;draw();clearTimeout(toastTmr);toastTmr=setTimeout(function(){toastMsg="";draw()},2500)}
function gasPost(u,d){if(!u)return;try{fetch(u,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(d),mode:"no-cors"})}catch(e){}}
function parseCSV(text){var lines=text.trim().split(/\r?\n/).filter(function(l){return l.trim()});if(lines.length<2)return null;var sep=lines[0].indexOf("\t")>=0?"\t":",";function pl(l){if(sep==="\t")return l.split("\t").map(function(c){return c.trim().replace(/^"|"$/g,"")});var r=[],cur="",q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"')q=!q;else if(ch===","&&!q){r.push(cur.trim());cur=""}else cur+=ch}r.push(cur.trim());return r}var hdr=pl(lines[0]);var data=[];for(var i=1;i<lines.length;i++){var r=pl(lines[i]);if(r.some(function(c){return c}))data.push(r)}if(!data.length)return null;var lh=hdr.map(function(h){return(h||"").toLowerCase()});function fc(ps){for(var i=0;i<lh.length;i++)for(var j=0;j<ps.length;j++)if(lh[i].indexOf(ps[j])>=0)return i;return-1}var c={co:fc(["施設","会社","法人","事業所","名称","company","name"]),ph:fc(["電話","tel","phone","番号"]),pe:fc(["担当","氏名","施設長","管理者","代表"]),ad:fc(["住所","所在地","address"])};if(c.co<0&&c.ph<0)return null;return{hdr:hdr,data:data,cm:c}}
function tryLogin(){if(pin.length!==3)return;var f=null;for(var i=0;i<STAFF.length;i++)if(STAFF[i].pin===pin){f=STAFF[i];break}if(f){user=f;V="home";pin="";pinErr="";att=LS("k10-att-"+f.id)||{};draw()}else{pinErr="該当番号なし";pin="";draw()}}
function doImport(){var ta=document.getElementById("pasteArea");var val=ta?ta.value:"";if(!val.trim()){pasteErr="テキストが空です";draw();return}pasteErr="";var r=parseCSV(val);if(!r){pasteErr="読込失敗。1行目にヘッダー（施設名, 電話番号等）が必要";draw();return}rows=r.data;cm=r.cm;ci=0;LS("k10-list",{d:r.data,c:r.cm});showPaste=false;flash("✅ "+r.data.length+"件 読込完了！")}
function loadTestData(){var t="施設名\t電話番号\t担当者名\t住所\nABC介護施設\t045-111-2222\t田中太郎\t横浜市西区\nDEF老人ホーム\t045-333-4444\t佐藤花子\t川崎市中原区\nGHIデイサービス\t045-555-6666\t鈴木一郎\t横浜市港北区\nJKL特養\t045-777-8888\t高橋美咲\t横浜市青葉区\nMNOグループホーム\t045-999-0000\t伊藤健太\t川崎市高津区";var r=parseCSV(t);if(r){rows=r.data;cm=r.cm;ci=0;LS("k10-list",{d:r.data,c:r.cm});showPaste=false;flash("✅ テストデータ5件読込")}}
function punch(type){var t=fmtTime(),td=today();if(!att[td])att[td]={};att[td][type]=t;LS("k10-att-"+user.id,att);var lb={ci:"出勤",co:"退勤",bs:"休憩開始",be:"休憩終了"};flash("✅ "+lb[type]+" "+t.slice(0,5));if(gasUrl){var a=att[td];gasPost(gasUrl,{type:"attendance",name:user.name,pin:user.pin,date:fmtJP(),clockIn:a.ci||"",clockOut:a.co||"",breakStart:a.bs||"",breakEnd:a.be||""})}}
function startCall(){ck={};cardI=0;timerSec=0;timerOn=true;clearInterval(timerRef);timerRef=setInterval(function(){timerSec++;var el=document.getElementById("timerDisp");if(el)el.textContent=fmtTimer()},1000);V="call";var cur=rows[ci];var ph=cur?gf(cur,"ph"):"";if(ph)setTimeout(function(){dial(ph)},500);draw()}
function stopTimer(){timerOn=false;clearInterval(timerRef)}
function advanceNext(){for(var i=ci+1;i<rows.length;i++)if(!isCalled(i)){ci=i;return};if(ci<rows.length-1)ci++}
function saveResult(){if(!res)return;var cur=rows[ci]||null;var notesEl=document.getElementById("callNotesTA");if(notesEl)callNotes=notesEl.value;var sp=STEPS.map(function(st){return{id:st.id,p:Math.round(st.cps.filter(function(c){return ck[c.id]}).length/st.cps.length*100)}});var e={id:Date.now(),uid:user.id,co:cur?gf(cur,"co"):"—",pe:cur?gf(cur,"pe"):"—",ph:cur?gf(cur,"ph"):"",r:res,cp:getComp(),dur:fmtTimer(),n:callNotes,sp:sp,d:today(),tm:fmtTime().slice(0,5),pi:ci};callHist.unshift(e);LS("k10-hist",callHist);ck={};cardI=0;callNotes="";stopTimer();timerSec=0;if(res==="appo"){af.company=cur?gf(cur,"co"):"";af.person=cur?gf(cur,"pe"):"";af.phone=cur?gf(cur,"ph"):"";af.address=cur?gf(cur,"ad"):"";res=null;V="appo_form";draw()}else{advanceNext();res=null;flash("✅ 保存完了");V="home";draw()}}
function sendAppo(){["project","company","person","phone","role","address","datetime","email","personality"].forEach(function(f){var el=document.getElementById("af_"+f);if(el)af[f]=el.value});var body="アポイント報告\n\n案件名: "+af.project+"\n会社名(施設名): "+af.company+"\n担当者名: "+af.person+"（"+af.gender+"）\n電話番号: "+af.phone+"\n役職: "+af.role+"\n住所: "+af.address+"\nアポイント日時: "+af.datetime+"\nメール: "+af.email+"\n人柄: "+af.personality+"\n\n報告者: "+user.name;var subj="【アポ報告】"+af.company+" "+af.person+"様 - "+user.name;appoList.unshift({project:af.project,company:af.company,person:af.person,gender:af.gender,phone:af.phone,role:af.role,address:af.address,datetime:af.datetime,email:af.email,personality:af.personality,id:Date.now(),reporter:user.name,date:today()});LS("k10-appo",appoList);window.location.href="mailto:a.kusunoki@sukimagroup.jp?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);setTimeout(function(){af={project:"",company:"",person:"",gender:"男",phone:"",role:"",address:"",datetime:"",email:"",personality:""};advanceNext();flash("✅ アポ送信完了");V="home";draw()},1500)}
function doCheck(){var cp=ALL_CP[cardI];if(!cp)return;ck[cp.id]=!ck[cp.id];draw();if(ck[cp.id]&&cardI<ALL_CP.length-1)setTimeout(function(){cardI++;draw()},350)}

function draw(){
var $=document.getElementById("app"),cur=rows[ci]||null,ca=getCurA(),tc=getTdc(),tdA=tc.filter(function(c){return c.r==="appo"}).length,h="";
if(toastMsg)h+='<div class="toast">'+toastMsg+'</div>';

if(V==="login"){$.innerHTML='<div style="min-height:100vh;background:linear-gradient(135deg,#0d1b2a,#1a237e);display:flex;align-items:center;justify-content:center;padding:20px"><div style="background:#fff;border-radius:18px;padding:28px 24px;max-width:340px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.25)"><div style="text-align:center;margin-bottom:18px"><div style="font-size:36px">📞</div><div style="font-size:18px;font-weight:800;color:#1a237e">川嶋メソッド</div><div style="font-size:9px;color:#90a4ae;letter-spacing:2px">テレアポ統合管理</div></div><div style="text-align:center;font-size:13px;color:#455a64;margin-bottom:12px">3桁の従業員番号を入力</div><div style="display:flex;justify-content:center;gap:10px;margin-bottom:12px">'+[0,1,2].map(function(i){return'<div style="width:48px;height:56px;border-radius:12px;border:2px solid '+(pin.length>i?"#1a237e":"#e0e0e0")+';background:'+(pin.length>i?"#e8eaf6":"#fafafa")+';display:flex;align-items:center;justify-content:center;font-size:24px;color:#1a237e">'+(pin[i]?"●":"")+'</div>'}).join("")+'</div><div id="numpad" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;max-width:200px;margin:0 auto 12px"></div>'+(pinErr?'<div style="text-align:center;font-size:12px;color:#e53935;font-weight:700">'+pinErr+'</div>':'')+'<div style="text-align:center;font-size:10px;color:#b0bec5;margin-top:12px">091:柏木 / 092:園田 / 093:堀内</div></div></div>';var np=document.getElementById("numpad");[1,2,3,4,5,6,7,8,9,null,0,"⌫"].forEach(function(n){var b=document.createElement("button");b.style.cssText="height:48px;border-radius:10px;font-size:"+(n==="⌫"?"16":"20")+"px;border:1.5px solid #e0e0e0;background:#fff;color:#1a237e";if(n===null){b.style.visibility="hidden";b.textContent=" "}else{b.textContent=n;b.onclick=function(){if(n==="⌫"){pin=pin.slice(0,-1);pinErr="";draw();return}if(pin.length>=3)return;pin+=String(n);pinErr="";draw();tryLogin()}}np.appendChild(b)});return}

h+='<header class="hdr"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:16px">📞</span><div><div style="font-size:12px;font-weight:800">川嶋メソッド</div><div style="font-size:10px;color:#64748b">'+user.name+' | '+fmtTime().slice(0,5)+'</div></div></div>';

h+='<button id="logoutBtn" class="bk">ログアウト</button></header>';

if(showPaste)h+='<div class="ov" id="ovBg"><div class="sh" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #e2e8f0"><span style="font-size:16px;font-weight:800">📋 リスト読込</span><button id="closePasteBtn" style="font-size:22px;color:#94a3b8;background:none;border:none;cursor:pointer">✕</button></div><div style="padding:16px"><div style="font-size:13px;color:#64748b;margin-bottom:8px;line-height:1.6">① スプレッドシートで全セルをコピー<br>② 下に貼り付け<br>③「読み込む」をタップ</div><textarea id="pasteArea" class="ta" rows="8" placeholder="施設名&#9;電話番号&#9;担当者名&#10;ABC介護&#9;045-111-2222&#9;田中太郎"></textarea><button id="importBtn" class="btn b" style="margin-top:8px">📥 読み込む</button><button id="testBtn" style="width:100%;margin-top:8px;padding:12px;border:2px dashed #e2e8f0;border-radius:12px;background:#f8fafc;color:#64748b;font-size:13px;font-weight:600;cursor:pointer">🧪 テストデータで試す（5件）</button>'+(pasteErr?'<div class="err">'+pasteErr+'</div>':'')+'<div style="margin-top:12px;padding:10px;background:#eff6ff;border-radius:8px;font-size:11px;color:#1d4ed8;line-height:1.6">💡 1行目はヘッダー<br>認識: 施設名/会社名, 電話番号/TEL, 担当者名, 住所</div></div></div></div>';
