function parseCSV(raw){
  if(!raw||!raw.trim())return{err:"テキストが空です"};
  var text=raw.replace(/^\uFEFF/,"").replace(/\u200B/g,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  var lines=text.split("\n").filter(function(l){return l.trim()});
  if(!lines.length)return{err:"データが空です"};
  var sep="\t";if(lines[0].indexOf("\t")<0){sep=lines[0].indexOf(",")>=0?",":"SP"}
  function split(l){if(sep==="\t")return l.split("\t").map(function(c){return c.trim()});if(sep===","){var r=[],cur="",q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"')q=!q;else if(ch===","&&!q){r.push(cur.trim());cur=""}else cur+=ch}r.push(cur.trim());return r}return l.split(/\s{2,}/).map(function(c){return c.trim()})}
  var all=lines.map(split);
  var hdrKeys=["施設","会社","法人","事業所","名称","名前","電話","tel","phone","番号","担当","氏名","住所","所在地","company","name","連絡","管理者","施設長","クライアント","顧客","責任者"];
  var firstLower=all[0].join("").toLowerCase().replace(/[\s　]/g,"");
  var isHdr=false;for(var k=0;k<hdrKeys.length;k++){if(firstLower.indexOf(hdrKeys[k])>=0){isHdr=true;break}}
  var hasPhoneFirst=false;for(var j=0;j<all[0].length;j++){if(/^\d{2,4}[\-\d]{4,}/.test(all[0][j])){hasPhoneFirst=true;break}}
  if(hasPhoneFirst)isHdr=false;
  var data,cm;
  if(isHdr&&all.length>=2){data=all.slice(1);var hl=all[0].map(function(h){return(h||"").toLowerCase().replace(/[\s　]/g,"")});function fc(ps){for(var i=0;i<hl.length;i++)for(var j=0;j<ps.length;j++)if(hl[i].indexOf(ps[j])>=0)return i;return-1}cm={co:fc(["施設","会社","法人","事業所","名称","名前","company","name","クライアント","顧客"]),ph:fc(["電話","tel","phone","番号","連絡"]),pe:fc(["担当","氏名","施設長","管理者","責任者"]),ad:fc(["住所","所在地","address","エリア"])}}
  else{data=all;var nc=all[0].length;var phCol=-1;for(var c=0;c<nc;c++){var hits=0;for(var r=0;r<Math.min(data.length,5);r++){if(data[r][c]&&/[\d\-]{6,}/.test(data[r][c]))hits++}if(hits>=Math.min(data.length,2)){phCol=c;break}}
  if(nc<=1)cm={co:0,ph:-1,pe:-1,ad:-1};else if(nc===2)cm={co:phCol===0?1:0,ph:phCol>=0?phCol:1,pe:-1,ad:-1};else if(nc===3){var nC=phCol===0?1:0;var pC=-1;for(var x=0;x<3;x++)if(x!==nC&&x!==phCol){pC=x;break};cm={co:nC,ph:phCol>=0?phCol:1,pe:pC>=0?pC:2,ad:-1}}else cm={co:0,ph:phCol>=0?phCol:1,pe:2,ad:3}}
  data=data.filter(function(r){return r.some(function(c){return c&&c.trim()})});
  if(!data.length)return{err:"データ行が0件です"};
  return{err:null,rows:data,cm:cm,count:data.length}
}

/* Upcoming appointment checker */
function getUpcomingAppos(appoList){
  var now=new Date();var result=[];
  if(!appoList)return result;
  appoList.forEach(function(a){
    if(!a.datetime)return;
    var dt;
    try{dt=new Date(a.datetime)}catch(e){return}
    if(isNaN(dt.getTime()))return;
    var diff=(dt.getTime()-now.getTime())/(1000*60*60*24);
    if(diff>=0&&diff<=3){
      result.push({company:a.company||"",person:a.person||"",phone:a.phone||"",email:a.email||"",address:a.address||"",datetime:a.datetime,daysLeft:Math.ceil(diff)});
    }
  });
  return result;
}

/* Share code: encode list data as base64 for LINE sharing */
function encodeShareCode(rows,cm){
  try{var obj={r:rows,c:cm};var json=JSON.stringify(obj);return btoa(unescape(encodeURIComponent(json)))}catch(e){return null}
}
function decodeShareCode(code){
  try{var json=decodeURIComponent(escape(atob(code.trim())));var obj=JSON.parse(json);if(obj.r&&obj.c)return obj;return null}catch(e){return null}
}

/* ===== LOGIN FIX: 3桁→スタッフチェック（失敗しても消さない）、4桁→管理者チェック ===== */
function tryLogin(){
  var p=S.pin;
  if(p.length===3){
    var f=null;for(var i=0;i<STAFF.length;i++)if(STAFF[i].pin===p){f=STAFF[i];break}
    if(f){S.role=f;S.screen="home";S.pin="";S.pinErr="";loadUser(f.id);R();return}
    /* 3桁で見つからない→4桁目を待つ（リセットしない！） */
  }
  if(p.length===4){
    if(p===ADMIN_PIN){S.role="admin";S.screen="admin";S.pin="";S.pinErr="";S.adminTarget=STAFF[0]?STAFF[0].id:null;R()}
    else{S.pinErr="番号が違います";S.pin="";R()}
  }
}

function doImport(){
