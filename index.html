<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>川嶋メソッド</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Hiragino Kaku Gothic ProN',sans-serif;background:#f8fafc;color:#1e293b;max-width:480px;margin:0 auto;min-height:100vh;font-size:14px}
button{font-family:inherit;cursor:pointer}input,textarea,select{font-family:inherit;font-size:14px}
@keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-200%)}}
.ticker{background:linear-gradient(90deg,#fef3c7,#fde68a);padding:8px 0;overflow:hidden;white-space:nowrap;border-bottom:1px solid #f59e0b}
.ticker span{display:inline-block;padding-left:100%;animation:scroll 25s linear infinite;font-size:13px;font-weight:700;color:#92400e}
.step-card{background:#fff;border-radius:12px;padding:12px;border:1px solid #e2e8f0;margin-bottom:8px}
.step-title{font-size:13px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.step-note{font-size:12px;color:#475569;line-height:1.8;margin-bottom:6px;padding:8px;background:#f8fafc;border-radius:8px}
.chk-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;margin-bottom:4px;cursor:pointer;border:1.5px solid #e2e8f0}
.chk-row.done{border-color:#10b981;background:#f0fdf4}
.chk-box{width:24px;height:24px;border-radius:6px;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.chk-row.done .chk-box{border-color:#10b981;background:#10b981;color:#fff}
.radio-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;cursor:pointer;border:1.5px solid #e2e8f0}
.radio-row.sel{border-color:#ef4444;background:#fef2f2}
.radio-dot{width:20px;height:20px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.radio-row.sel .radio-dot{border-color:#ef4444;background:#ef4444}
.radio-row.sel .radio-dot::after{content:"";width:8px;height:8px;border-radius:50%;background:#fff}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
"use strict";

var GAS_URL="https://script.google.com/macros/s/AKfycbyWeLwAktSqOqA_jZL5oDZQSXKCrCSxevmCeAqaIfXgX1ID1XWHQ6sbOdqeX91QcsJQ/exec";

var STAFF=[
  {id:"s091",name:"柏木幸代",pin:"091",sheet:"柏木"},
  {id:"s092",name:"園田絵里",pin:"092",sheet:"園田"},
  {id:"s093",name:"堀内真紀子",pin:"093",sheet:"堀内"}
];
var ADMIN_PIN="9999";

/* 新トークスクリプト5ステップ */
var TALK_STEPS=[
  {id:"s1",title:"ステップ1：YES取り2回",color:"#3b82f6",icon:"🤝",
   checks:[
     {id:"s1a",label:"「〇〇様、私のこと覚えていらっしゃいますか？」"},
     {id:"s1b",label:"「私の声、今遠くないですか？大丈夫ですか？」"}
   ],
   note:"YESを2回取ることで心理的コミットメントを得る"},
  {id:"s2",title:"ステップ2：ほめる",color:"#10b981",icon:"💐",
   checks:[
     {id:"s2a",label:"「ってか、あれですねー ス テ キ な声ですねー」"}
   ],
   note:"相手の緊張をほぐし、好意的な関係を構築する"},
  {id:"s3",title:"ステップ3：目的を聞く",color:"#f59e0b",icon:"🎯",
   checks:[
     {id:"s3a",label:"「ちなみに何を叶えていきたいです？」"}
   ],
   note:"相手のニーズ・願望を引き出す。ここで深掘りする"},
  {id:"s4",title:"ステップ4：ビフォーアフター",color:"#8b5cf6",icon:"✨",
   checks:[
     {id:"s4a",label:"ビフォーアフターを話す"},
     {id:"s4b",label:"「そんな状態になったら、ご気分いかがですか？」を聞く"}
   ],
   note:"理想の状態をイメージさせ、感情を動かす"},
  {id:"s5",title:"日程打診",color:"#ef4444",icon:"📅",
   checks:[
     {id:"s5a",label:"YESをもらってから打診する"},
     {id:"s5b",label:"「うちのサービスが1度合うかどうかだけ、是非お話聞いてみて下さい」"}
   ],
   note:"YESを確認してから日程を提案。焦らない"}
];
var ALL_CHECKS=[];TALK_STEPS.forEach(function(s){s.checks.forEach(function(c){ALL_CHECKS.push(c.id)})});

var RTYPES=[{id:"appo",l:"アポ獲得",i:"🎯",c:"#10b981"},{id:"cb",l:"再架電",i:"📞",c:"#f59e0b"},{id:"info",l:"資料送付",i:"📨",c:"#3b82f6"},{id:"absent",l:"不在",i:"🚫",c:"#6b7280"},{id:"refused",l:"断り",i:"✋",c:"#ef4444"},{id:"wrong",l:"不通",i:"❌",c:"#9ca3af"},{id:"followup",l:"フォロー",i:"📋",c:"#8b5cf6"},{id:"other",l:"その他",i:"📝",c:"#64748b"}];

function LD(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function SV(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function pad(n){return n<10?"0"+n:""+n}
function timeNow(){var d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds())}
function dateNow(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function dateJP(){var d=new Date();return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日"}

/* ★ 電話発信：アプリから離脱しない方式 ★
   tel:リンクは使わない。代わりに番号を大きく表示し、
   ユーザーがタップしてコピー→電話アプリで発信。
   または手動でtel:を踏む（自動遷移はしない） */
function showDialPrompt(number){
  if(!number)return;
  var clean=number.replace(/[^\d+\-]/g,"");
  /* クリップボードにコピー */
  try{navigator.clipboard.writeText(clean)}catch(e){}
  /* tel:リンクを新しいタブで開く（元の画面は維持） */
  var w=window.open("tel:"+clean,"_blank");
  if(!w){
    var a=document.createElement("a");a.href="tel:"+clean;a.target="_blank";a.style.display="none";
    document.body.appendChild(a);a.click();
    setTimeout(function(){try{document.body.removeChild(a)}catch(e){}},300);
  }
}

function gasPost(data){if(!GAS_URL)return;try{fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(data),mode:"no-cors"})}catch(e){}}

function fetchList(staffObj,cb){
  if(!GAS_URL){if(cb)cb(false);return}
  fetch(GAS_URL+"?pin="+encodeURIComponent(staffObj.pin)+"&t="+Date.now(),{redirect:"follow"})
    .then(function(r){return r.text()})
    .then(function(t){try{var d=JSON.parse(t);if(d&&d.rows&&d.rows.length>0){S.prospects=d.rows;S.colMap=d.cm||{co:0,ph:1,pe:2,ad:3};S.ci=0;S.skipped={};SV("app-list-"+staffObj.id,d.rows);SV("app-cm-"+staffObj.id,d.cm);SV("app-skip-"+staffObj.id,{});if(cb)cb(true,d.rows.length)}else{if(cb)cb(false)}}catch(e){if(cb)cb(false)}})
    .catch(function(){if(cb)cb(false)})
}

/* State */
var S={
  screen:"login",role:null,pin:"",pinErr:"",toast:"",toastTmr:null,loading:false,
  prospects:[],colMap:null,ci:0,skipped:{},
  callHist:[],appoHist:[],att:{},
  /* Call state - new */
  ck:{},tsec:0,tRef:null,selRes:null,
  bousou:"none", /* none,s1,s2,s3,s4,s5 */
  outText:"", /* 切り返しできなかったアウト */
  memo:"",
  af:{project:"",company:"",person:"",gender:"男",phone:"",role:"",address:"",datetime:"",email:"",personality:""},
  showImp:false,impErr:"",adminTarget:null
};

function loadUser(uid){
  S.prospects=LD("app-list-"+uid)||[];S.colMap=LD("app-cm-"+uid)||null;S.ci=0;S.skipped=LD("app-skip-"+uid)||{};
  S.callHist=LD("app-calls-"+uid)||[];S.appoHist=LD("app-appos-"+uid)||[];S.att=LD("app-att-"+uid)||{};
}
function gf(row,f){if(!row||!S.colMap||S.colMap[f]<0)return"";return String(row[S.colMap[f]]||"").trim()}
function today(){return dateNow()}
function todayCalls(){var uid=S.role&&S.role!=="admin"?S.role.id:"";return S.callHist.filter(function(c){return c.d===today()&&c.uid===uid})}
function isCalled(i){return todayCalls().some(function(c){return c.pi===i})}
function isSkipped(i){return S.skipped[i]===true}
function shouldShow(i){return!isCalled(i)&&!isSkipped(i)}
function todayAtt(){return S.att[today()]||{}}
function timerFmt(){return pad(Math.floor(S.tsec/60))+":"+pad(S.tsec%60)}
function flash(m){S.toast=m;R();clearTimeout(S.toastTmr);S.toastTmr=setTimeout(function(){S.toast="";R()},2500)}
function goNext(){for(var i=S.ci+1;i<S.prospects.length;i++)if(shouldShow(i)){S.ci=i;return};for(var i=0;i<S.ci;i++)if(shouldShow(i)){S.ci=i;return}}
function getUpcoming(){var now=new Date(),r=[];S.appoHist.forEach(function(a){if(!a.datetime)return;try{var dt=new Date(a.datetime)}catch(e){return}if(isNaN(dt.getTime()))return;var diff=(dt.getTime()-now.getTime())/(1000*60*60*24);if(diff>=0&&diff<=3)r.push({company:a.company||"",phone:a.phone||"",address:a.address||"",datetime:a.datetime})});return r}
function checkedCount(){var c=0;ALL_CHECKS.forEach(function(id){if(S.ck[id])c++});return c}

/* Actions */
function tryLogin(){
  var p=S.pin;
  if(p.length===3){var f=null;for(var i=0;i<STAFF.length;i++)if(STAFF[i].pin===p){f=STAFF[i];break}
    if(f){S.role=f;S.screen="home";S.pin="";S.pinErr="";loadUser(f.id);S.loading=true;R();fetchList(f,function(ok,c){S.loading=false;if(ok)flash("✅ "+c+"件取得");R()});return}}
  if(p.length===4){
    if(p===ADMIN_PIN){S.role="admin";S.screen="admin";S.pin="";S.pinErr="";R()}
    else{S.pinErr="番号が違います";S.pin="";R()}}
}
function doImport(){
  var ta=document.getElementById("impTA");var val=ta?ta.value:"";
  if(!val.trim()){S.impErr="テキストが空です";R();return}
  /* Simple CSV parse */
  var text=val.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  var lines=text.split("\n").filter(function(l){return l.trim()});if(lines.length<1){S.impErr="データが空";R();return}
  var sep="\t";if(lines[0].indexOf("\t")<0)sep=lines[0].indexOf(",")>=0?",":"SP";
  function sp(l){if(sep==="\t")return l.split("\t").map(function(c){return c.trim()});if(sep===","){var r=[],cur="",q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"')q=!q;else if(ch===","&&!q){r.push(cur.trim());cur=""}else cur+=ch}r.push(cur.trim());return r}return l.split(/\s{2,}/).map(function(c){return c.trim()})}
  var all=lines.map(sp);
  var hK=["施設","会社","法人","名称","名前","電話","tel","番号","担当","氏名","住所","company","name"];
  var fl=all[0].join("").toLowerCase();var isH=false;for(var k=0;k<hK.length;k++){if(fl.indexOf(hK[k])>=0){isH=true;break}}
  var hasP=false;for(var j=0;j<all[0].length;j++){if(/^\d{2,4}[\-\d]{4,}/.test(all[0][j])){hasP=true;break}}if(hasP)isH=false;
  var data,cm;
  if(isH&&all.length>=2){data=all.slice(1);var hl=all[0].map(function(h){return(h||"").toLowerCase()});function fc(ps){for(var i=0;i<hl.length;i++)for(var j=0;j<ps.length;j++)if(hl[i].indexOf(ps[j])>=0)return i;return-1}cm={co:fc(["施設","会社","法人","名称","名前","company","name"]),ph:fc(["電話","tel","番号","連絡"]),pe:fc(["担当","氏名","施設長"]),ad:fc(["住所","所在地"])}}
  else{data=all;var nc=all[0].length;if(nc<=1)cm={co:0,ph:-1,pe:-1,ad:-1};else if(nc===2)cm={co:0,ph:1,pe:-1,ad:-1};else if(nc===3)cm={co:0,ph:1,pe:2,ad:-1};else cm={co:0,ph:1,pe:2,ad:3}}
  data=data.filter(function(r){return r.some(function(c){return c&&c.trim()})});
  if(!data.length){S.impErr="データ0件";R();return}
  var uid=S.role==="admin"&&S.adminTarget?S.adminTarget:S.role&&S.role!=="admin"?S.role.id:null;
  if(!uid){S.impErr="ユーザー未選択";R();return}
  SV("app-list-"+uid,data);SV("app-cm-"+uid,cm);
  if(S.role!=="admin"&&S.role.id===uid){S.prospects=data;S.colMap=cm;S.ci=0;S.skipped={};SV("app-skip-"+uid,{})}
  S.showImp=false;S.impErr="";
  var sn="";for(var i=0;i<STAFF.length;i++)if(STAFF[i].id===uid)sn=STAFF[i].name;
  flash("✅ "+sn+"に"+data.length+"件読込")
}
function doSkip(){S.skipped[S.ci]=true;SV("app-skip-"+S.role.id,S.skipped);flash("⏭ スキップ");goNext();R()}
function undoSkips(){S.skipped={};SV("app-skip-"+S.role.id,{});flash("全解除");R()}
function doPunch(type){
  var t=timeNow(),d=today();if(!S.att[d])S.att[d]={};S.att[d][type]=t;SV("app-att-"+S.role.id,S.att);
  var lb={ci:"出勤",co:"退勤",bs:"休憩開始",be:"休憩終了"};flash("✅ "+lb[type]+" "+t.slice(0,5));
  var a=S.att[d];gasPost({type:"attendance",name:S.role.name,pin:S.role.pin,date:dateJP(),clockIn:a.ci||"",clockOut:a.co||"",breakStart:a.bs||"",breakEnd:a.be||""})
}
function startCall(){
  S.ck={};S.tsec=0;S.selRes=null;S.bousou="none";S.outText="";S.memo="";
  clearInterval(S.tRef);S.tRef=setInterval(function(){S.tsec++;var el=document.getElementById("tmr");if(el)el.textContent=timerFmt()},1000);
  S.screen="call";R();
  /* ★ 自動発信しない → ユーザーが番号タップで手動発信 ★ */
}
function stopTimer(){clearInterval(S.tRef)}

function saveResult(){
  if(!S.selRes)return;
  /* DOMから値を読む */
  var outEl=document.getElementById("outTA");if(outEl)S.outText=outEl.value;
  var memoEl=document.getElementById("memoTA");if(memoEl)S.memo=memoEl.value;
  var cur=S.prospects[S.ci]||null;
  var checkedSteps={};TALK_STEPS.forEach(function(st){var done=st.checks.filter(function(c){return S.ck[c.id]}).length;checkedSteps[st.id]=done+"/"+st.checks.length});
  var entry={id:Date.now(),uid:S.role.id,co:cur?gf(cur,"co"):"—",pe:cur?gf(cur,"pe"):"—",ph:cur?gf(cur,"ph"):"",r:S.selRes,dur:timerFmt(),steps:checkedSteps,bousou:S.bousou,outText:S.outText,memo:S.memo,d:today(),tm:timeNow().slice(0,5),pi:S.ci};
  S.callHist.unshift(entry);SV("app-calls-"+S.role.id,S.callHist);
  /* ★ スプレッドシートに結果を書き戻す ★ */
  var resLabel="";for(var i=0;i<RTYPES.length;i++)if(RTYPES[i].id===S.selRes){resLabel=RTYPES[i].l;break}
  var bousouLabel=S.bousou==="none"?"なし":S.bousou;
  gasPost({
    type:"callResult",
    name:S.role.name,pin:S.role.pin,sheet:S.role.sheet,
    date:dateJP(),time:timeNow().slice(0,5),
    company:cur?gf(cur,"co"):"",phone:cur?gf(cur,"ph"):"",person:cur?gf(cur,"pe"):"",
    result:resLabel,duration:timerFmt(),
    checkedCount:checkedCount()+"/"+ALL_CHECKS.length,
    bousou:bousouLabel,outText:S.outText,memo:S.memo
  });
  stopTimer();S.tsec=0;S.ck={};S.selRes=null;S.bousou="none";S.outText="";S.memo="";
  if(entry.r==="appo"){
    S.af.company=cur?gf(cur,"co"):"";S.af.person=cur?gf(cur,"pe"):"";S.af.phone=cur?gf(cur,"ph"):"";S.af.address=cur?gf(cur,"ad"):"";
    S.screen="appo_form";R()
  }else{goNext();S.screen="home";flash("✅ 保存→次へ");R()}
}

function sendAppo(){
  ["project","company","person","phone","role","address","datetime","email","personality"].forEach(function(f){var el=document.getElementById("af_"+f);if(el)S.af[f]=el.value});
  var a=S.af;var body="アポイント報告\n\n案件名: "+a.project+"\n会社名: "+a.company+"\n担当者: "+a.person+"（"+a.gender+"）\n電話: "+a.phone+"\n役職: "+a.role+"\n住所: "+a.address+"\nアポ日時: "+a.datetime+"\nメール: "+a.email+"\n人柄: "+a.personality+"\n\n報告者: "+S.role.name;
  var subj="【アポ報告】"+a.company+" "+a.person+"様 - "+S.role.name;
  S.appoHist.unshift({project:a.project,company:a.company,person:a.person,gender:a.gender,phone:a.phone,role:a.role,address:a.address,datetime:a.datetime,email:a.email,personality:a.personality,id:Date.now(),reporter:S.role.name,date:today()});
  SV("app-appos-"+S.role.id,S.appoHist);
  window.location.href="mailto:a.kusunoki@sukimagroup.jp?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);
  setTimeout(function(){S.af={project:"",company:"",person:"",gender:"男",phone:"",role:"",address:"",datetime:"",email:"",personality:""};goNext();S.screen="home";flash("✅ 送信完了");R()},1500)
}

/* ===== RENDER ===== */
function R(){
try{
var root=document.getElementById("root"),h="",isAdmin=S.role==="admin";
if(S.toast)h+='<div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:700;z-index:999">'+S.toast+'</div>';

/* LOGIN */
if(S.screen==="login"){
  h+='<div style="min-height:100vh;background:linear-gradient(135deg,#0d1b2a,#1a237e);display:flex;align-items:center;justify-content:center;padding:20px"><div style="background:#fff;border-radius:18px;padding:28px 24px;max-width:340px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.25)"><div style="text-align:center;margin-bottom:18px"><div style="font-size:36px">📞</div><div style="font-size:18px;font-weight:800;color:#1a237e">川嶋メソッド</div><div style="font-size:9px;color:#90a4ae;letter-spacing:2px">テレアポ統合管理</div></div><div style="text-align:center;font-size:13px;color:#455a64;margin-bottom:12px">従業員番号を入力</div><div style="display:flex;justify-content:center;gap:8px;margin-bottom:12px">';
  for(var i=0;i<4;i++){var f=S.pin.length>i;h+='<div style="width:44px;height:52px;border-radius:12px;border:2px solid '+(f?"#1a237e":"#e0e0e0")+';background:'+(f?"#e8eaf6":"#fafafa")+';display:flex;align-items:center;justify-content:center;font-size:22px;color:#1a237e">'+(f?"●":"")+'</div>'}
  h+='</div><div id="pp" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;max-width:200px;margin:0 auto 12px"></div>';
  if(S.pinErr)h+='<div style="text-align:center;font-size:12px;color:#e53935;font-weight:700">'+S.pinErr+'</div>';
  h+='</div></div>';root.innerHTML=h;
  var pp=document.getElementById("pp");
  [1,2,3,4,5,6,7,8,9,null,0,"DEL"].forEach(function(n){var b=document.createElement("button");b.style.cssText="height:48px;border-radius:10px;font-size:"+(n==="DEL"?"14":"20")+"px;border:1.5px solid #e0e0e0;background:#fff;color:#1a237e;font-family:inherit";if(n===null){b.style.visibility="hidden";b.textContent=" "}else{b.textContent=n==="DEL"?"⌫":n;b.onclick=function(){if(n==="DEL"){S.pin=S.pin.slice(0,-1);S.pinErr="";R();return}if(S.pin.length>=4)return;S.pin+=String(n);S.pinErr="";R();tryLogin()}}pp.appendChild(b)});return;
}

/* Header */

if(mb){var unc=S.prospects.filter(function(_,i){return shouldShow(i)}).length;
[["📑 リスト","残"+unc,function(){S.screen="list";R()}],["🎯 アポ履歴",S.appoHist.length+"件",function(){S.screen="appolist";R()}]].forEach(function(m){var b=document.createElement("button");b.innerHTML=m[0]+'<br><span style="font-size:10px;color:#94a3b8">'+m[1]+'</span>';b.style.cssText="padding:14px 12px;border:1px solid #e2e8f0;border-radius:14px;background:#fff;color:#1e293b;font-size:14px;font-weight:700;text-align:left;cursor:pointer;font-family:inherit";b.onclick=m[2];mb.appendChild(b)})}

/* Result buttons */
var rb=document.getElementById("rb");
if(rb){RTYPES.forEach(function(r){var b=document.createElement("button");var sel=S.selRes===r.id;b.style.cssText="display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 2px;border:2px solid "+(sel?r.c:"#e2e8f0")+";border-radius:10px;background:"+(sel?r.c+"10":"#fff")+";min-height:48px;cursor:pointer;font-family:inherit";b.innerHTML='<span style="font-size:18px">'+r.i+'</span><span style="font-size:9px;font-weight:700;color:'+(sel?r.c:"#94a3b8")+'">'+r.l+'</span>';b.onclick=function(){S.selRes=r.id;R()};rb.appendChild(b)})}

/* Gender */
var gb=document.getElementById("gb");
if(gb){["男","女"].forEach(function(g){var b=document.createElement("button");b.textContent=g;var sel=S.af.gender===g;b.style.cssText="flex:1;padding:8px;border:2px solid "+(sel?"#3b82f6":"#e2e8f0")+";border-radius:8px;background:"+(sel?"#eff6ff":"#fff")+";color:"+(sel?"#3b82f6":"#64748b")+";font-size:13px;font-weight:700;cursor:pointer;font-family:inherit";b.onclick=function(){S.af.gender=g;R()};gb.appendChild(b)})}

/* List */
var lst=document.getElementById("lst");
if(lst){var tc=todayCalls();S.prospects.forEach(function(row,i){var cl=isCalled(i),sk=isSkipped(i);var ri=null;if(cl){var m=tc.filter(function(c){return c.pi===i});if(m.length)for(var j=0;j<RTYPES.length;j++)if(RTYPES[j].id===m[0].r){ri=RTYPES[j];break}}var d=document.createElement("div");d.style.cssText="padding:10px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;background:"+(i===S.ci?"#eff6ff":sk?"#fffbeb":cl?"#f8fafc":"#fff")+";border-radius:8px;margin-bottom:2px";d.innerHTML='<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:#94a3b8;width:22px">'+(i+1)+'</span><span style="flex:1;font-size:14px;font-weight:700;'+(sk?"text-decoration:line-through;color:#94a3b8":"")+'">'+(gf(row,"co")||"行"+(i+1))+'</span>'+(sk?'<span style="font-size:9px;padding:2px 4px;border-radius:4px;background:#fef3c7;color:#92400e">スキップ</span>':cl&&ri?'<span style="font-size:10px;padding:2px 6px;border-radius:4px;background:'+ri.c+'15;color:'+ri.c+';font-weight:700">'+ri.i+ri.l+'</span>':'<span style="font-size:9px;padding:2px 4px;border-radius:4px;background:#f1f5f9;color:#94a3b8">未</span>')+'</div>'+(gf(row,"ph")?'<div style="font-size:12px;color:#3b82f6;margin-top:2px;margin-left:28px">📞'+gf(row,"ph")+'</div>':'');d.onclick=function(){S.ci=i;S.screen="home";R()};lst.appendChild(d)})}

/* Appo list */
var apo=document.getElementById("apo");
if(apo){S.appoHist.forEach(function(a){var d=document.createElement("div");d.style.cssText="background:#fff;border-radius:14px;padding:14px;border:1px solid #e2e8f0;margin-bottom:8px";d.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:14px;font-weight:800;color:#1a237e">'+(a.company||"—")+'</span><span style="font-size:10px;color:#94a3b8">'+(a.date||"")+'</span></div><div style="font-size:12px;color:#475569;line-height:1.7">'+(a.project?'<div>📋 '+a.project+'</div>':'')+'<div>👤 '+(a.person||"")+'（'+(a.gender||"")+'）'+(a.role?" / "+a.role:"")+'</div>'+(a.phone?'<div style="color:#3b82f6;font-weight:700;cursor:pointer" data-ph="'+a.phone+'">📞 '+a.phone+'（発信）</div>':'')+(a.address?'<div>📍 '+a.address+'</div>':'')+(a.datetime?'<div>📅 '+a.datetime+'</div>':'')+(a.email?'<div>✉ '+a.email+'</div>':'')+(a.personality?'<div>💬 '+a.personality+'</div>':'')+'</div>';d.querySelectorAll("[data-ph]").forEach(function(el){el.addEventListener("click",function(){showDialPrompt(el.getAttribute("data-ph"))})});apo.appendChild(d)})}

}catch(e){document.getElementById("root").innerHTML='<div style="padding:20px;color:red"><b>エラー:</b> '+String(e.message||e)+'<br><button onclick="location.reload()" style="margin-top:10px;padding:10px 20px;background:#3b82f6;color:#fff;border:none;border-radius:8px">再読み込み</button></div>'}
}
R();
})();
</script>
</body>
</html>
