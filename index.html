/* ===== STORAGE ===== */
function loadData(key){
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  catch(e){ return null; }
}
function saveData(key, val){
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){}
}

/* ===== STATE ===== */
var state = {
  screen: "login",
  user: null,
  pinDigits: "",
  pinError: "",
  toastText: "",
  toastTimer: null,

  prospects: [],
  colMap: null,
  currentIndex: 0,

  showImportModal: false,
  importError: "",
  importPreview: "",

  checkedItems: {},
  currentCard: 0,
  timerSeconds: 0,
  timerRunning: false,
  timerInterval: null,

  selectedResult: null,
  callMemo: "",

  appoForm: {project:"",company:"",person:"",gender:"男",phone:"",role:"",address:"",datetime:"",email:"",personality:""},
  appoHistory: [],

  attendance: {},
  gasUrl: "",

  callHistory: []
};

/* Load saved data */
var savedList = loadData("app-list");
if(savedList){ state.prospects = savedList.rows || []; state.colMap = savedList.colMap || null; }
state.callHistory = loadData("app-calls") || [];
state.appoHistory = loadData("app-appos") || [];
state.gasUrl = loadData("app-gas") || "";

/* ===== HELPERS ===== */
function padNum(n){ return n < 10 ? "0" + n : "" + n; }
function timeNow(){ var d = new Date(); return padNum(d.getHours()) + ":" + padNum(d.getMinutes()) + ":" + padNum(d.getSeconds()); }
function dateNow(){ var d = new Date(); return d.getFullYear() + "-" + padNum(d.getMonth()+1) + "-" + padNum(d.getDate()); }
function dateJP(){ var d = new Date(); return d.getFullYear() + "年" + (d.getMonth()+1) + "月" + d.getDate() + "日"; }
function timerFormat(){ return padNum(Math.floor(state.timerSeconds/60)) + ":" + padNum(state.timerSeconds % 60); }

function getField(row, fieldKey){
  if(!row || !state.colMap || state.colMap[fieldKey] < 0) return "";
  var val = row[state.colMap[fieldKey]];
  return val ? String(val).trim() : "";
}

function todayCalls(){
  var today = dateNow();
  var uid = state.user ? state.user.id : "";
  return state.callHistory.filter(function(c){ return c.date === today && c.userId === uid; });
}

function isCalledToday(index){
  return todayCalls().some(function(c){ return c.prospectIndex === index; });
}

function compliancePercent(){
  if(REQUIRED_ITEMS.length === 0) return 0;
  var done = REQUIRED_ITEMS.filter(function(x){ return state.checkedItems[x.id]; }).length;
  return Math.round(done / REQUIRED_ITEMS.length * 100);
}

function todayAttendance(){
  return state.attendance[dateNow()] || {};
}

function showToast(msg){
  state.toastText = msg;
  render();
  clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(function(){ state.toastText = ""; render(); }, 2500);
}

function dialPhone(number){
  if(!number) return;
  var clean = number.replace(/[^\d+\-]/g, "");
  if(!clean) return;
  try {
    var link = document.createElement("a");
    link.href = "tel:" + clean;
    link.style.display = "none";
    document.body.appendChild(link);
    link.click();
    setTimeout(function(){ try{ document.body.removeChild(link); }catch(e){} }, 300);
  } catch(e){}
}

function postToGAS(data){
  if(!state.gasUrl) return;
  try {
    fetch(state.gasUrl, {
      method: "POST",
      headers: {"Content-Type": "text/plain;charset=utf-8"},
      body: JSON.stringify(data),
      mode: "no-cors"
    });
  } catch(e){}
}

/* ===== CSV PARSER (super tolerant) ===== */
function parseSpreadsheetData(rawText){
  if(!rawText || !rawText.trim()) return {error: "テキストが空です"};

  var text = rawText.replace(/^\uFEFF/, "").replace(/\u200B/g, "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  var lines = text.split("\n");
  var nonEmpty = [];
  for(var i = 0; i < lines.length; i++){
    if(lines[i].trim() !== "") nonEmpty.push(lines[i]);
  }
  if(nonEmpty.length === 0) return {error: "データが空です"};

  var separator = "\t";
  if(nonEmpty[0].indexOf("\t") < 0){
    if(nonEmpty[0].indexOf(",") >= 0) separator = ",";
    else if(nonEmpty[0].indexOf("  ") >= 0) separator = "SPACE";
  }

  function splitLine(line){
    if(separator === "\t") return line.split("\t").map(function(c){ return c.trim(); });
    if(separator === ","){
      var result = [], current = "", inQuote = false;
      for(var i = 0; i < line.length; i++){
        var ch = line[i];
        if(ch === '"') inQuote = !inQuote;
        else if(ch === "," && !inQuote){ result.push(current.trim()); current = ""; }
        else current += ch;
      }
      result.push(current.trim());
      return result;
    }
    return line.split(/\s{2,}/).map(function(c){ return c.trim(); });
  }

  var allRows = nonEmpty.map(splitLine);
  var firstRow = allRows[0];

  var headerKeywords = ["施設","会社","法人","事業所","名称","名前","電話","tel","phone","番号","担当","氏名","住所","所在地","company","name","no","ナンバー","連絡","氏名","代表","施設長","管理者","クライアント","顧客","取引先","対象","責任者","エリア","地域"];
  var firstRowLower = firstRow.join("").toLowerCase().replace(/[\s　]/g, "");
  var looksLikeHeader = false;
  for(var k = 0; k < headerKeywords.length; k++){
    if(firstRowLower.indexOf(headerKeywords[k]) >= 0){ looksLikeHeader = true; break; }
  }

  var hasPhoneInFirst = false;
  for(var j = 0; j < firstRow.length; j++){
    if(/^\d{2,4}[\-\d]{4,}/.test(firstRow[j])){ hasPhoneInFirst = true; break; }
  }
  if(hasPhoneInFirst) looksLikeHeader = false;

  var dataRows, columnMap;

  if(looksLikeHeader && allRows.length >= 2){
    dataRows = allRows.slice(1);
    var headerLower = firstRow.map(function(h){ return (h || "").toLowerCase().replace(/[\s　]/g, ""); });
    function findColumn(patterns){
      for(var i = 0; i < headerLower.length; i++){
        for(var j = 0; j < patterns.length; j++){
          if(headerLower[i].indexOf(patterns[j]) >= 0) return i;
        }
      }
      return -1;
    }
    columnMap = {
      co: findColumn(["施設","会社","法人","事業所","名称","名前","company","name","クライアント","顧客","取引先","対象"]),
      ph: findColumn(["電話","tel","phone","番号","連絡"]),
      pe: findColumn(["担当","氏名","施設長","管理者","代表","contact","person","責任者"]),
      ad: findColumn(["住所","所在地","address","エリア","地域"])
    };
  } else {
    dataRows = allRows;
    var numCols = firstRow.length;

    var phoneCol = -1;
    for(var col = 0; col < numCols; col++){
      var phoneHits = 0;
      for(var row = 0; row < Math.min(dataRows.length, 5); row++){
        if(dataRows[row][col] && /[\d\-]{6,}/.test(dataRows[row][col])) phoneHits++;
      }
      if(phoneHits >= Math.min(dataRows.length, 2)){ phoneCol = col; break; }
    }

    if(numCols === 1){
      columnMap = {co: 0, ph: -1, pe: -1, ad: -1};
    } else if(numCols === 2){
      if(phoneCol === 0) columnMap = {co: 1, ph: 0, pe: -1, ad: -1};
      else columnMap = {co: 0, ph: 1, pe: -1, ad: -1};
    } else if(numCols === 3){
      if(phoneCol >= 0){
        var nameCol = phoneCol === 0 ? 1 : 0;
        var personCol = -1;
        for(var c = 0; c < 3; c++){ if(c !== nameCol && c !== phoneCol){ personCol = c; break; } }
        columnMap = {co: nameCol, ph: phoneCol, pe: personCol, ad: -1};
      } else {
        columnMap = {co: 0, ph: 1, pe: 2, ad: -1};
      }
    } else {
      columnMap = {co: 0, ph: phoneCol >= 0 ? phoneCol : 1, pe: phoneCol === 1 ? 2 : (phoneCol === 0 ? 1 : 2), ad: 3};
    }
  }

  var validRows = dataRows.filter(function(r){ return r.some(function(c){ return c && c.trim(); }); });
  if(validRows.length === 0) return {error: "データ行が0件です"};

  return {
    error: null,
    rows: validRows,
    colMap: columnMap,
    count: validRows.length,
    isHeader: looksLikeHeader,
    separator: separator === "\t" ? "タブ" : separator === "," ? "カンマ" : "スペース",
    preview: {
      name: columnMap.co >= 0 && validRows[0][columnMap.co] ? validRows[0][columnMap.co] : "(なし)",
      phone: columnMap.ph >= 0 && validRows[0][columnMap.ph] ? validRows[0][columnMap.ph] : "(なし)",
      person: columnMap.pe >= 0 && validRows[0][columnMap.pe] ? validRows[0][columnMap.pe] : "(なし)"
    }
  };
}

/* ===== ACTIONS ===== */
function doLogin(){
  if(state.pinDigits.length !== 3) return;
  var found = null;
  for(var i = 0; i < STAFF.length; i++){
    if(STAFF[i].pin === state.pinDigits){ found = STAFF[i]; break; }
  }
  if(found){
    state.user = found;
    state.screen = "home";
    state.pinDigits = "";
    state.pinError = "";
    state.attendance = loadData("app-att-" + found.id) || {};
  } else {
    state.pinError = "該当番号なし";
    state.pinDigits = "";
  }
  render();
}

function doImport(){
  var textArea = document.getElementById("importTextarea");
  if(!textArea){ state.importError = "テキストエリアが見つかりません"; render(); return; }
  var rawValue = textArea.value;
  if(!rawValue || !rawValue.trim()){ state.importError = "テキストが空です。スプレッドシートの内容を貼り付けてから「読み込む」を押してください。"; state.importPreview = ""; render(); return; }
  var result = parseSpreadsheetData(rawValue);
  if(result.error){ state.importError = result.error; state.importPreview = ""; render(); return; }
  state.prospects = result.rows;
  state.colMap = result.colMap;
  state.currentIndex = 0;
  saveData("app-list", {rows: result.rows, colMap: result.colMap});
  state.showImportModal = false;
  state.importError = "";
  state.importPreview = "";
  showToast("✅ " + result.count + "件 読込完了！");
}

function doPreview(){
  var textArea = document.getElementById("importTextarea");
  if(!textArea){ state.importError = "テキストエリアが見つかりません"; render(); return; }
  var rawValue = textArea.value;
  if(!rawValue || !rawValue.trim()){ state.importError = "テキストが空です"; state.importPreview = ""; render(); return; }
  var result = parseSpreadsheetData(rawValue);
  if(result.error){ state.importError = result.error; state.importPreview = ""; render(); return; }
  state.importError = "";
  state.importPreview = "✅ " + result.count + "件検出（区切り: " + result.separator + "）\n1件目: " + result.preview.name + " / 📞" + result.preview.phone + " / 👤" + result.preview.person;
  render();
}

  state.prospects = [
    ["ABC介護施設","045-111-2222","田中太郎","横浜市西区"],
    ["DEF老人ホーム","045-333-4444","佐藤花子","川崎市中原区"],
    ["GHIデイサービス","045-555-6666","鈴木一郎","横浜市港北区"],

    ["MNOグループホーム","045-999-0000","伊藤健太","川崎市高津区"]
  ];
  state.colMap = {co:0, ph:1, pe:2, ad:3};
  state.currentIndex = 0;
  saveData("app-list", {rows: state.prospects, colMap: state.colMap});

function doPunch(type){
  var t = timeNow();
  var d = dateNow();
  if(!state.attendance[d]) state.attendance[d] = {};
  state.attendance[d][type] = t;
  saveData("app-att-" + state.user.id, state.attendance);
  var labels = {ci:"出勤", co:"退勤", bs:"休憩開始", be:"休憩終了"};
  showToast("✅ " + labels[type] + " " + t.slice(0,5));
  if(state.gasUrl){
    var a = state.attendance[d];
    postToGAS({name:state.user.name, pin:state.user.pin, date:dateJP(), clockIn:a.ci||"", clockOut:a.co||"", breakStart:a.bs||"", breakEnd:a.be||""});
  }
}

function doStartCall(){
  state.checkedItems = {};
  state.currentCard = 0;
  state.timerSeconds = 0;
  state.timerRunning = true;
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(function(){
    state.timerSeconds++;
    var el = document.getElementById("timerDisplay");
    if(el) el.textContent = timerFormat();
  }, 1000);
  state.screen = "call";
  render();
  var cur = state.prospects[state.currentIndex];
  var phone = cur ? getField(cur, "ph") : "";
  if(phone) setTimeout(function(){ dialPhone(phone); }, 600);
}

function doStopTimer(){
  state.timerRunning = false;
  clearInterval(state.timerInterval);
}

function doCheckItem(){
  var item = ALL_ITEMS[state.currentCard];
  if(!item) return;
  state.checkedItems[item.id] = !state.checkedItems[item.id];
  render();
  if(state.checkedItems[item.id] && state.currentCard < ALL_ITEMS.length - 1){
    setTimeout(function(){ state.currentCard++; render(); }, 400);
  }
}

function doSaveResult(){
  if(!state.selectedResult) return;
  var memoEl = document.getElementById("memoTextarea");
  var memo = memoEl ? memoEl.value : "";
  var cur = state.prospects[state.currentIndex] || null;
  var stepProgress = SCRIPT_STEPS.map(function(step){
    var total = step.items.length;
    var done = step.items.filter(function(item){ return state.checkedItems[item.id]; }).length;
    return {id: step.id, percent: Math.round(done / total * 100)};
  });
  var entry = {
    id: Date.now(),
    userId: state.user.id,
    company: cur ? getField(cur, "co") : "—",
    person: cur ? getField(cur, "pe") : "—",
    phone: cur ? getField(cur, "ph") : "",
    result: state.selectedResult,
    compliance: compliancePercent(),
    duration: timerFormat(),
    memo: memo,
    stepProgress: stepProgress,
    date: dateNow(),
    time: timeNow().slice(0,5),
    prospectIndex: state.currentIndex
  };
  state.callHistory.unshift(entry);
  saveData("app-calls", state.callHistory);

  state.checkedItems = {};
  state.currentCard = 0;
  state.callMemo = "";
  doStopTimer();
  state.timerSeconds = 0;

  if(state.selectedResult === "appo"){
    state.appoForm.company = cur ? getField(cur, "co") : "";
    state.appoForm.person = cur ? getField(cur, "pe") : "";
    state.appoForm.phone = cur ? getField(cur, "ph") : "";
    state.appoForm.address = cur ? getField(cur, "ad") : "";
    state.selectedResult = null;
    state.screen = "appo_form";
  } else {
    goToNextUncalled();
    state.selectedResult = null;
    state.screen = "home";
    showToast("✅ 保存完了");
  }
  render();
}

function doSendAppo(){
  var fields = ["project","company","person","phone","role","address","datetime","email","personality"];
  fields.forEach(function(f){
    var el = document.getElementById("appo_" + f);
    if(el) state.appoForm[f] = el.value;
  });
  var a = state.appoForm;
  var body = "アポイント報告\n\n案件名: " + a.project + "\n会社名: " + a.company + "\n担当者: " + a.person + "（" + a.gender + "）\n電話: " + a.phone + "\n役職: " + a.role + "\n住所: " + a.address + "\nアポ日時: " + a.datetime + "\nメール: " + a.email + "\n人柄: " + a.personality + "\n\n報告者: " + state.user.name;
  var subject = "【アポ報告】" + a.company + " " + a.person + "様 - " + state.user.name;
  var entry = {
    project:a.project, company:a.company, person:a.person, gender:a.gender,
    phone:a.phone, role:a.role, address:a.address, datetime:a.datetime,
    email:a.email, personality:a.personality,
    id:Date.now(), reporter:state.user.name, date:dateNow()
  };
  state.appoHistory.unshift(entry);
  saveData("app-appos", state.appoHistory);
  window.location.href = "mailto:a.kusunoki@sukimagroup.jp?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
  setTimeout(function(){
    state.appoForm = {project:"",company:"",person:"",gender:"男",phone:"",role:"",address:"",datetime:"",email:"",personality:""};
    goToNextUncalled();
    state.screen = "home";
    showToast("✅ アポ送信完了");
    render();
  }, 1500);
}

function goToNextUncalled(){
  for(var i = state.currentIndex + 1; i < state.prospects.length; i++){
    if(!isCalledToday(i)){ state.currentIndex = i; return; }
  }
  if(state.currentIndex < state.prospects.length - 1) state.currentIndex++;
}

/* ===== RENDER ===== */
function render(){
  try { renderInner(); }
  catch(e){
    document.getElementById("root").innerHTML = '<div style="padding:20px;color:red;font-size:12px"><b>エラーが発生しました:</b><br>' + String(e.message || e) + '<br><br><button onclick="location.reload()" style="padding:10px 20px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:14px">再読み込み</button></div>';
  }
}

function renderInner(){
var root = document.getElementById("root");
var html = "";
var S = state;

  if(el) el.addEventListener("click", fn);
}

bindClick("logoutBtn", function(){ S.user = null; S.screen = "login"; S.pinDigits = ""; render(); });
bindClick("modalBg", function(e){ if(e.target.id === "modalBg"){ S.showImportModal = false; S.importError = ""; S.importPreview = ""; render(); }});
bindClick("closeModalBtn", function(){ S.showImportModal = false; S.importError = ""; S.importPreview = ""; render(); });
bindClick("importBtn", doImport);
bindClick("previewBtn", doPreview);
bindClick("testDataBtn", doLoadTestData);
bindClick("startCallBtn", doStartCall);
bindClick("checkBtn", doCheckItem);
bindClick("saveResultBtn", function(){ if(S.selectedResult) doSaveResult(); });
bindClick("sendAppoBtn", doSendAppo);
bindClick("skipAppoBtn", function(){ goToNextUncalled(); S.screen = "home"; showToast("スキップ"); });
bindClick("backBtn", function(){ S.screen = S.screen === "result" ? "call" : "home"; render(); });

var gasInput = document.getElementById("gasInput");
if(gasInput) gasInput.addEventListener("input", function(){ S.gasUrl = this.value; saveData("app-gas", this.value); });

/* Attendance buttons */
var attBox = document.getElementById("attButtons");
if(attBox){
  var att = todayAttendance();
  [["ci","出勤","#10b981",!!att.ci],["bs","休憩始","#f59e0b",!att.ci||!!att.bs],["be","休憩終","#3b82f6",!att.bs||!!att.be],["co","退勤","#5c6bc0",!att.ci||!!att.co]].forEach(function(x){
    var btn = document.createElement("button");
    btn.textContent = x[1];
    btn.style.cssText = "padding:10px 4px;border:2px solid "+x[2]+";border-radius:8px;background:#fff;font-size:12px;font-weight:700;min-height:42px;text-align:center;color:"+x[2]+";opacity:"+(x[3]?0.25:1)+";cursor:pointer;font-family:inherit";
    btn.disabled = x[3];
    if(!x[3]) btn.onclick = function(){ doPunch(x[0]); };
    attBox.appendChild(btn);
  });
}

/* Nav buttons */
var navBox = document.getElementById("navButtons");
if(navBox){
  [["← 前",S.currentIndex>0,function(){S.currentIndex--;render();}],["次 →",S.currentIndex<S.prospects.length-1,function(){S.currentIndex++;render();}],["⏭ 未架電",true,function(){goToNextUncalled();render();}]].forEach(function(x){
    var btn = document.createElement("button");
    btn.textContent = x[0];
    btn.style.cssText = "flex:1;padding:8px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;color:#64748b;font-size:12px;font-weight:600;min-height:36px;text-align:center;opacity:"+(x[1]?1:0.3)+";cursor:pointer;font-family:inherit";
    if(x[1]) btn.onclick = x[2];
    navBox.appendChild(btn);
  });
}

/* Menu buttons */
var menuBox = document.getElementById("menuButtons");
if(menuBox){
  var uncalled = S.prospects.filter(function(_,i){ return !isCalledToday(i); }).length;
  [["📋 リスト読込",S.prospects.length+"件",function(){S.showImportModal=true;S.importError="";S.importPreview="";render();}],
   ["📑 リスト一覧","未"+uncalled,function(){S.screen="list";render();}],
   ["🎯 アポ履歴",S.appoHistory.length+"件",function(){S.screen="appolist";render();}],
   ["⚙ 設定","GAS連携",function(){S.screen="settings";render();}]
  ].forEach(function(m){
    var btn = document.createElement("button");
    btn.innerHTML = m[0] + '<br><span style="font-size:10px;color:#94a3b8">' + m[1] + '</span>';
    btn.style.cssText = "padding:14px 12px;border:1px solid #e2e8f0;border-radius:14px;background:#fff;color:#1e293b;font-size:14px;font-weight:700;text-align:left;cursor:pointer;font-family:inherit";
    btn.onclick = m[2];
    menuBox.appendChild(btn);
  });
}

/* Call nav buttons */
var callNavBox = document.getElementById("callNavBtns");
if(callNavBox){
  [["← 前",S.currentCard>0,function(){S.currentCard--;render();}],["次 →",S.currentCard<ALL_ITEMS.length-1,function(){S.currentCard++;render();}],["⏹ 終了",true,function(){doStopTimer();S.screen="result";render();}]].forEach(function(x,i){
    var btn = document.createElement("button");
    btn.textContent = x[0];
    btn.style.cssText = "flex:1;padding:11px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;color:#64748b;font-size:13px;font-weight:600;text-align:center;min-height:44px;opacity:"+(x[1]?1:0.3)+";cursor:pointer;font-family:inherit";
    if(i === 2) btn.style.cssText += ";background:#fef2f2;color:#dc2626;border-color:#fecaca;font-weight:700";
    if(x[1]) btn.onclick = x[2];
    callNavBox.appendChild(btn);
  });
}

/* Result buttons */
var resBox = document.getElementById("resultBtns");
if(resBox){
  RESULT_TYPES.forEach(function(r){
    var btn = document.createElement("button");
    var selected = S.selectedResult === r.id;
    btn.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:3px;padding:12px 2px;border:2px solid "+(selected?r.color:"#e2e8f0")+";border-radius:10px;background:"+(selected?r.color+"10":"#fff")+";min-height:52px;cursor:pointer;font-family:inherit";
    btn.innerHTML = '<span style="font-size:20px">'+r.icon+'</span><span style="font-size:10px;font-weight:700;color:'+(selected?r.color:"#94a3b8")+'">'+r.label+'</span>';
    btn.onclick = function(){ S.selectedResult = r.id; render(); };
    resBox.appendChild(btn);
  });
}

/* Gender buttons */
var genderBox = document.getElementById("genderBtns");
if(genderBox){
  ["男","女"].forEach(function(g){
    var btn = document.createElement("button");
    var selected = S.appoForm.gender === g;
    btn.textContent = g;
    btn.style.cssText = "flex:1;padding:8px;border:2px solid "+(selected?"#3b82f6":"#e2e8f0")+";border-radius:8px;background:"+(selected?"#eff6ff":"#fff")+";color:"+(selected?"#3b82f6":"#64748b")+";font-size:13px;font-weight:700;cursor:pointer;font-family:inherit";
    btn.onclick = function(){ S.appoForm.gender = g; render(); };
    genderBox.appendChild(btn);
  });
}

/* List items */
var listBox = document.getElementById("listContainer");
if(listBox){
  var tc = todayCalls();
  S.prospects.forEach(function(row, i){
    var called = isCalledToday(i);
    var resultInfo = null;
    if(called){
      var match = tc.filter(function(c){ return c.prospectIndex === i; });
      if(match.length){
        for(var j = 0; j < RESULT_TYPES.length; j++){
          if(RESULT_TYPES[j].id === match[0].result){ resultInfo = RESULT_TYPES[j]; break; }
        }
      }
    }
    var div = document.createElement("div");
    div.style.cssText = "padding:10px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;background:"+(i===S.currentIndex?"#eff6ff":called?"#f8fafc":"#fff")+";border-radius:8px;margin-bottom:2px";
    div.innerHTML = '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:#94a3b8;width:22px">'+(i+1)+'</span><span style="flex:1;font-size:14px;font-weight:700">'+(getField(row,"co")||"行"+(i+1))+'</span>'+(called&&resultInfo?'<span style="font-size:10px;padding:2px 6px;border-radius:4px;background:'+resultInfo.color+'15;color:'+resultInfo.color+';font-weight:700">'+resultInfo.icon+resultInfo.label+'</span>':'<span style="font-size:9px;padding:2px 4px;border-radius:4px;background:#f1f5f9;color:#94a3b8">未</span>')+'</div>'+(getField(row,"ph")?'<div style="font-size:12px;color:#3b82f6;margin-top:2px;margin-left:28px">📞'+getField(row,"ph")+'</div>':"");
    div.onclick = function(){ S.currentIndex = i; S.screen = "home"; render(); };
    listBox.appendChild(div);
  });
}

/* Appo list items */
var appoBox = document.getElementById("appoListContainer");
if(appoBox){
  S.appoHistory.forEach(function(a){
    var div = document.createElement("div");
    div.style.cssText = "background:#fff;border-radius:14px;padding:14px;border:1px solid #e2e8f0;margin-bottom:8px";
    div.innerHTML = '<div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:14px;font-weight:800;color:#1a237e">'+(a.company||"—")+'</span><span style="font-size:10px;color:#94a3b8">'+(a.date||"")+'</span></div><div style="font-size:12px;color:#475569;line-height:1.7">'+(a.project?'<div>📋 '+a.project+'</div>':'')+'<div>👤 '+(a.person||"")+'（'+(a.gender||"")+'）'+(a.role?" / "+a.role:"")+'</div>'+(a.phone?'<div style="color:#3b82f6;font-weight:700;cursor:pointer" data-phone="'+a.phone+'">📞 '+a.phone+'（タップで発信）</div>':'')+(a.address?'<div>📍 '+a.address+'</div>':'')+(a.datetime?'<div>📅 '+a.datetime+'</div>':'')+(a.email?'<div>✉ '+a.email+'</div>':'')+(a.personality?'<div>💬 '+a.personality+'</div>':'')+(a.reporter?'<div style="font-size:10px;color:#94a3b8;margin-top:2px">報告者: '+a.reporter+'</div>':'')+'</div>';
    div.querySelectorAll("[data-phone]").forEach(function(el){
      el.addEventListener("click", function(){ dialPhone(el.getAttribute("data-phone")); });
    });
    appoBox.appendChild(div);
  });
}

} /* end renderInner */

render();
})();
</script>
</body>
</html>
